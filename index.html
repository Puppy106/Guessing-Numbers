<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess the Number</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main class="game-card">
        <h1>Guess the Number</h1>
        <p class="subtitle">Pick a number between 1 and 100.</p>

        <div class="difficulty-buttons">
            <button class="difficulty-button active" data-difficulty="easy">Easy</button>
            <button class="difficulty-button" data-difficulty="medium">Medium</button>
            <button class="difficulty-button" data-difficulty="hard">Hard</button>
        </div>

        <div class="controls">
            <input type="number" id="guessInput" min="1" max="100" placeholder="Enter your guess" autocomplete="off">
            <button id="submitGuess">Guess</button>
        </div>

        <p id="message" class="message">Good luck! Try to guess the number.</p>
        <p id="attempts" class="attempts">Attempts: 0</p>
        <div class="footer-buttons">
            <button id="resetButton" class="reset-button">Start new game</button>
        </div>
    </main>

    <button id="settingsToggle" class="settings-toggle" aria-label="Open settings">⚙ Settings</button>
    <aside id="settingsPanel" class="settings-panel" aria-hidden="true">
        <div class="settings-card">
            <div class="settings-header">
                <h2>Settings</h2>
                <button id="closeSettings" class="close-settings" aria-label="Close settings">✕</button>
            </div>
            <p class="settings-text">Stop or start the background music anytime.</p>
            <div class="setting-row">
                <label for="backgroundColorInput">Background color</label>
                <input type="color" id="backgroundColorInput" value="#4b6cb7">
            </div>
            <div class="setting-row">
                <label for="rangeMaxInput">Max number</label>
                <input type="number" id="rangeMaxInput" value="100" min="10" max="1000" step="10">
            </div>
            <button id="musicToggle" class="music-button">🎵 Play Music</button>
            <button id="endGameButton" class="end-game-button">End Game</button>
        </div>
    </aside>

    <script src="script.js"></script>
</body>
</html>
